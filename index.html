<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Colecionáveis Marvel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Portal de Colecionáveis Marvel</h1>
        <nav id="main-nav">
            <a href="search.html" id="nav-search-link">Buscar</a>
            <button id="logout-button" type="button">Logout</button>
        </nav>
    </header>
    <main>
        <h2>Meus Colecionáveis</h2>
        <p id="collectible-count-display" style="text-align: center; margin-bottom: 15px; font-size: 1.1em; color: #fff; text-shadow: 1px 1px 1px #000;"></p>
        <div class="collection-grid">
            <!-- Static items removed, will be populated by script.js -->
        </div>

        <section id="upload-section">
            <h2>Adicionar Novo Boneco à Coleção</h2>
            <form id="upload-form">
                <div>
                    <label for="collectible-name">Nome do Boneco:</label>
                    <input type="text" id="collectible-name" name="collectible-name" required>
                </div>
                <div>
                    <label for="collectible-source">Filme/Série/Desenho:</label>
                    <input type="text" id="collectible-source" name="collectible-source" required>
                </div>
                <div>
                    <label for="collectible-year">Ano:</label>
                    <input type="text" id="collectible-year" name="collectible-year" required>
                </div>
                <div>
                    <label for="image-upload">Imagem do Boneco:</label>
                    <input type="file" id="image-upload" name="image-upload" accept="image/*" required>
                </div>
                <img id="image-preview" src="#" alt="Pré-visualização da imagem" style="display: none;">
                <p id="upload-form-message" class="message" style="display: none;"></p>
                <button type="submit">Adicionar Boneco</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> <!-- Corrected from UTF-F-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Colecionáveis</title>
    <script>
        // Script de Roteamento Imediato
        (function() {
            // Verifica se o usuário está logado (usando sessionStorage)
            if (sessionStorage.getItem('loggedIn') === 'true') {
                // Se logado, redireciona para o dashboard pessoal
                window.location.replace('dashboard.html');
            } else {
                // Se não logado, redireciona para a galeria pública
                window.location.replace('public-gallery.html');
            }
        })();
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #1a1a2e; /* Match public gallery background */
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Full viewport height */
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        /* Simple spinner */
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid #ffcc00; /* Thematic yellow */
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            /* margin: 20px auto; -- No longer needed with flex centering */
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <p>Redirecionando...</p>
    <div class="spinner"></div>
    <!-- O usuário não deve ver esta página por muito tempo -->
</body>
</html>

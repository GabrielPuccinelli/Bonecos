<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Portal de Colecionáveis</title>
    <link rel="stylesheet" href="register.style.css">
</head>
<body>
    <div class="register-container">
        <p style="text-align: center; margin-bottom: 1em;"><a href="index.html" class="home-link">Voltar à Página Inicial</a></p>
        <h2>Cadastro de Novo Usuário</h2>
        <form id="register-form">
            <div>
                <label for="reg-username">Usuário:</label>
                <input type="text" id="reg-username" name="reg-username" required>
            </div>
            <div>
                <label for="reg-password">Senha:</label>
                <input type="password" id="reg-password" name="reg-password" required>
            </div>
            <div>
                <label for="reg-confirm-password">Confirmar Senha:</label>
                <input type="password" id="reg-confirm-password" name="reg-confirm-password" required>
            </div>
            <div class="form-group">
                <label for="reg-profile-image">Imagem de Perfil (Opcional):</label>
                <input type="file" id="reg-profile-image" name="reg-profile-image" accept="image/*">
                <img id="reg-profile-image-preview" src="#" alt="Pré-visualização do Perfil" style="max-width: 100px; max-height: 100px; display: none; margin-top: 10px; border-radius: 50%;">
            </div>
            <button type="submit">Cadastrar</button>
            <p id="register-message" class="message" style="display: none;"></p>
        </form>
        <p>Já tem uma conta? <a href="login.html">Faça login aqui</a>.</p>
    </div>
    <script src="register.script.js"></script>
</body>
</html>

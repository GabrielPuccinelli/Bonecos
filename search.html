<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca - Portal de Colecionáveis</title>
    <link rel="stylesheet" href="search.style.css"> <!-- Page-specific styles first -->
    <!-- public-gallery.style.css could be linked if search page should share its exact body/header/footer theme -->
    <!-- For now, search.style.css will handle its own theming, including sidebar -->
</head>
<body>
    <aside id="user-sidebar" style="display: none;">
        <div class="sidebar-profile-info">
            <img id="sidebar-profile-image" src="https://via.placeholder.com/80x80.png?text=Perfil" alt="Imagem de Perfil">
            <h3 id="sidebar-username">[Nome do Usuário]</h3>
        </div>
        <div class="sidebar-stats">
            <p>Bonecos: <span id="sidebar-collectible-count">0</span></p>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-button">Adicionar/Gerenciar</a>
            <a href="edit-profile.html" class="sidebar-button">Editar Perfil</a>
            <a href="messages.html" class="sidebar-button" id="sidebar-messages-link">
                Mensagens <span id="sidebar-unread-badge" class="unread-badge" style="display:none;">0</span>
            </a>
        </nav>
    </aside>

    <div id="page-content-wrapper">
        <header class="page-header"> <!-- This is the search-specific header -->
            <h1>Página de Busca</h1>
            <a href="index.html" class="nav-link">Voltar à Página Inicial</a>
        </header>

        <div class="search-container">
            <form id="search-form">
                <input type="text" id="search-query" placeholder="Buscar usuários ou bonecos..." required>
                <button type="submit">Buscar</button>
            </form>
        </div>

        <div class="results-container">
            <section id="user-results-section">
                <h2>Usuários Encontrados</h2>
                <div id="user-results-grid" class="results-grid">
                    <p class="no-results-message" style="display:none;">Nenhum usuário encontrado.</p>
                </div>
            </section>

            <hr class="results-divider">

            <section id="collectible-results-section">
                <h2>Bonecos Encontrados</h2>
                <div id="collectible-results-grid" class="results-grid">
                    <p class="no-results-message" style="display:none;">Nenhum boneco encontrado.</p>
                </div>
            </section>
        </div>

        <!-- It's good practice to have a footer on all pages -->
        <footer class="page-footer" style="text-align: center; padding: 20px 0; margin-top: 30px; border-top: 1px solid #444;">
            <p>&copy; 2023 Portal de Colecionáveis. Todos os direitos reservados.</p>
        </footer>
    </div> <!-- End of page-content-wrapper -->

    <script src="search.script.js"></script>
    <!-- If search.script.js doesn't handle sidebar, a common script would be needed -->

    <div id="chat-modal-overlay" class="chat-modal-overlay" style="display:none;">
        <div id="chat-modal-content" class="chat-modal-content">
            <button id="close-chat-modal-btn" class="close-chat-modal-btn">&times;</button>
            <h3 id="chat-modal-title">Conversa sobre...</h3>
            <div id="chat-modal-item-info" class="chat-modal-item-info">
                <img src="#" alt="Item" id="chat-modal-item-image" style="max-width:50px; max-height:50px; border-radius:4px; margin-right:10px;">
                <span id="chat-modal-item-name"></span>
            </div>
            <div id="chat-modal-messages" class="chat-messages-container">
                <!-- Messages will be populated here -->
            </div>
            <form id="chat-modal-form" class="chat-form">
                <textarea id="chat-modal-input" placeholder="Digite sua mensagem..." rows="3" required></textarea>
                <button type="submit" class="sidebar-button-style">Enviar</button>
            </form>
        </div>
    </div>
</body>
</html>
